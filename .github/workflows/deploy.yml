name: Master Auto-Deploy Revenue System

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target platform'
        required: true
        default: 'railway'
        type: choice
        options:
          - railway
          - render
          - vercel
          - kubernetes

jobs:
  test:
    name: Run bash test suite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run test suite
        run: |
          chmod +x tests/test_deploy.sh
          ./tests/test_deploy.sh

  deploy-all-systems:
    name: Deploy all revenue systems
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️ RAILWAY_TOKEN not configured — skipping deploy"
            echo "Add secrets at: https://github.com/Garrettc123/master-deployment-auto-deploy-revenue/settings/secrets/actions"
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - name: Set up deployment environment
        if: env.SKIP_DEPLOY != 'true'
        run: |
          chmod +x deploy.sh scripts/autodeploy-revenue-systems.sh

      - name: Install Railway CLI
        if: env.SKIP_DEPLOY != 'true' && (github.event.inputs.deploy_target == 'railway' || github.event.inputs.deploy_target == '')
        run: npm install -g @railway/cli

      - name: Install Vercel CLI
        if: env.SKIP_DEPLOY != 'true' && github.event.inputs.deploy_target == 'vercel'
        run: npm install -g vercel

      - name: Deploy all systems
        if: env.SKIP_DEPLOY != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ./deploy.sh "${{ github.event.inputs.deploy_target || 'railway' }}"

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ github.run_number }}
          path: .deploy-logs/
          retention-days: 30

  setup-monitoring:
    name: Configure monitoring
    runs-on: ubuntu-latest
    needs: deploy-all-systems
    if: success()
    permissions: {}

    steps:
      - name: Configure monitoring
        run: |
          echo "Setting up monitoring dashboards..."
          echo "Revenue tracking: ENABLED"
          echo "Error monitoring: ENABLED"
          echo "Performance metrics: ENABLED"

      - name: Setup billing webhooks
        run: |
          echo "Configuring Stripe webhooks..."
          echo "Billing automation: ACTIVE"
